<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Mission Cultural Day</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: linear-gradient(to right, #1a2a6c, #b21f1f, #fdbb2d);
    color: #fff;
}

/* CONTAINER */
.container {
    width: 90%;
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

/* HEADER */
h1 {
    text-align: center;
}

/* FORM */
form {
    background: rgba(0,0,0,0.6);
    padding: 20px;
    border-radius: 10px;
}

input, select, textarea {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 5px;
    border: none;
}

label {
    font-weight: bold;
}

button {
    background: #28a745;
    color: white;
    padding: 12px;
    border: none;
    width: 100%;
    border-radius: 5px;
    cursor: pointer;
}

button:hover {
    background: #218838;
}

/* ERROR */
.error {
    color: #ff4d4d;
    font-size: 14px;
}

/* SUCCESS */
.success {
    text-align: center;
    margin-top: 10px;
    color: #00ffcc;
}

/* LIST */
.list {
    margin-top: 30px;
    background: rgba(0,0,0,0.6);
    padding: 20px;
    border-radius: 10px;
}

.entry {
    background: #222;
    padding: 10px;
    margin: 10px 0;
    border-radius: 5px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.delete-btn {
    background: red;
    border: none;
    padding: 5px 10px;
    color: white;
    cursor: pointer;
}

/* RESPONSIVE */
@media (max-width:600px) {
    .entry {
        flex-direction: column;
        align-items: flex-start;
    }
}
</style>
</head>

<body>

<div class="container">

<h1>🌍 World Mission Cultural Day</h1>

<form id="form">

<label>Full Name</label>
<input type="text" id="name">

<label>Email</label>
<input type="email" id="email">

<label>Phone</label>
<input type="text" id="phone">

<label>Gender</label>
<input type="radio" name="gender" value="Male"> Male
<input type="radio" name="gender" value="Female"> Female

<label>Country / Culture</label>
<input type="text" id="country">

<label>Participation Type</label>
<select id="type">
<option value="">Select</option>
<option>Performer</option>
<option>Volunteer</option>
<option>Attendee</option>
</select>

<label>Special Requests</label>
<textarea id="request"></textarea>

<label>
<input type="checkbox" id="terms"> Accept Terms & Conditions
</label>

<div class="error" id="error"></div>

<button type="submit">Register</button>

<div class="success" id="success"></div>

</form>

<div class="list">
<h2>Registered Participants</h2>
<div id="entries"></div>
</div>

</div>

<script>
const form = document.getElementById("form");
const error = document.getElementById("error");
const success = document.getElementById("success");
const entriesDiv = document.getElementById("entries");

// Load existing data
let registrations = JSON.parse(localStorage.getItem("registrations")) || [];

function display() {
    entriesDiv.innerHTML = "";

    registrations.forEach((reg, index) => {
        const div = document.createElement("div");
        div.className = "entry";

        div.innerHTML = `
            <div>
                <strong>${reg.name}</strong><br>
                ${reg.type} | ${reg.country}
            </div>
            <button class="delete-btn" onclick="deleteEntry(${index})">Delete</button>
        `;

        entriesDiv.appendChild(div);
    });
}

display();

// DELETE
function deleteEntry(index) {
    registrations.splice(index, 1);
    localStorage.setItem("registrations", JSON.stringify(registrations));
    display();
}

// VALIDATION + SUBMIT
form.addEventListener("submit", function(e) {
    e.preventDefault();

    error.textContent = "";
    success.textContent = "";

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const gender = document.querySelector('input[name="gender"]:checked');
    const country = document.getElementById("country").value.trim();
    const type = document.getElementById("type").value;
    const request = document.getElementById("request").value.trim();
    const terms = document.getElementById("terms").checked;

    // VALIDATION
    if (!name || !email || !phone || !country || !type) {
        error.textContent = "Please fill all required fields.";
        return;
    }

    const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
    if (!email.match(emailPattern)) {
        error.textContent = "Invalid email format.";
        return;
    }

    if (!/^[0-9]{8,15}$/.test(phone)) {
        error.textContent = "Phone must be numbers (8–15 digits).";
        return;
    }

    if (!gender) {
        error.textContent = "Select gender.";
        return;
    }

    if (!terms) {
        error.textContent = "You must accept terms.";
        return;
    }

    const data = {
        name,
        email,
        phone,
        gender: gender.value,
        country,
        type,
        request
    };

    registrations.push(data);
    localStorage.setItem("registrations", JSON.stringify(registrations));

    success.textContent = "Registration successful!";
    form.reset();

    display();
});
</script>

</body>
</html>
